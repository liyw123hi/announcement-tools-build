name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller openpyxl pandas selenium webdriver-manager PyPDF2 python-docx olefile py7zr
        pip install docx2txt 2>nul || echo "docx2txt not available, skipping"
    
    - name: Build 公告下载器
      run: |
        copy config1.txt config.txt
        pyinstaller --clean --noconfirm --name "公告下载器" --console --add-data "config.txt;." --hidden-import=openpyxl --hidden-import=py7zr download_announcements_win10.py
        mkdir output\公告下载器
        xcopy /e /i /y dist\公告下载器 output\公告下载器 >nul
        copy config.txt output\公告下载器\ >nul
    
    - name: Build 公告验证工具_PDF校验
      run: |
        copy config2.txt config.txt
        pyinstaller --clean --noconfirm --name "公告验证工具_PDF校验" --console --add-data "config.txt;." --hidden-import=openpyxl --hidden-import=pandas --hidden-import=selenium --hidden-import=PyPDF2 --hidden-import=python-docx 公告验证工具_pdf.py
        mkdir output\公告验证工具_PDF校验
        xcopy /e /i /y dist\公告验证工具_PDF校验 output\公告验证工具_PDF校验 >nul
        copy config.txt output\公告验证工具_PDF校验\ >nul
    
    - name: Build 公告验证工具_按日v6
      run: |
        copy config3.txt config.txt
        pyinstaller --clean --noconfirm --name "公告验证工具_按日v6" --console --add-data "config.txt;." --hidden-import=openpyxl --hidden-import=pandas --hidden-import=selenium --hidden-import=PyPDF2 --hidden-import=python-docx --hidden-import=olefile 公告验证工具_按日v6_win10.py
        mkdir output\公告验证工具_按日v6
        xcopy /e /i /y dist\公告验证工具_按日v6 output\公告验证工具_按日v6 >nul
        copy config.txt output\公告验证工具_按日v6\ >nul
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: 公告工具_Windows_exe
        path: output\
