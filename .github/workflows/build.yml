name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller openpyxl pandas selenium webdriver-manager PyPDF2 python-docx olefile py7zr
    
    - name: Build all EXEs
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path output -Force | Out-Null
        
        # Build 公告下载器
        Copy config1.txt config.txt
        pyinstaller --clean --noconfirm --onefile --name "公告下载器" --console download_announcements_win10.py
        Copy dist\公告下载器.exe output\
        Copy config.txt output\
        
        # Build 公告验证工具_PDF校验
        Copy config2.txt config.txt
        pyinstaller --clean --noconfirm --onefile --name "公告验证工具_PDF校验" --console 公告验证工具_pdf.py
        Copy dist\公告验证工具_PDF校验.exe output\
        Copy config.txt output\
        
        # Build 公告验证工具_按日v6
        Copy config3.txt config.txt
        pyinstaller --clean --noconfirm --onefile --name "公告验证工具_按日v6" --console 公告验证工具_按日v6_win10.py
        Copy dist\公告验证工具_按日v6.exe output\
        Copy config.txt output\
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: 公告工具_单exe
        path: output\
